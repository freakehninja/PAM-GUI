<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PAM Vault</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- xterm for PSM SSH terminal -->
<link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css"/>
<script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Mono',monospace,Consolas;font-size:13px;transition:background 0.2s,color 0.2s;}
body.dark{background:#0a0e1a;color:#f1f5f9;}
body.light{background:#f1f5f9;color:#1e293b;}
input,select,button,textarea{font-family:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input[type=checkbox]{accent-color:#0ea5e9;width:14px;height:14px;cursor:pointer;}
.dark{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e3a5f;--text:#f1f5f9;--muted:#94a3b8;--dim:#475569;}
.light{--bg:#f1f5f9;--surface:#ffffff;--surface2:#e2e8f0;--border:#cbd5e1;--text:#1e293b;--muted:#64748b;--dim:#94a3b8;}
</style>
</head>
<body class="dark">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const API="";
// Accent colors always the same regardless of theme
const ACCENT="#0ea5e9";
const SUCCESS="#10b981";
const DANGER="#ef4444";
const WARNING="#f59e0b";
const PURPLE="#a78bfa";

// Theme-aware color getter
function useTheme(){
  const [dark,setDark]=useState(()=>localStorage.getItem("pam_theme")!=="light");
  function toggle(){setDark(d=>{const nd=!d;localStorage.setItem("pam_theme",nd?"dark":"light");document.body.className=nd?"dark":"light";return nd;});}
  useEffect(()=>{document.body.className=dark?"dark":"light";},[dark]);
  return {dark,toggle};
}

let _token=localStorage.getItem("pam_token")||"";
let _role=localStorage.getItem("pam_role")||"";

async function api(method,path,body){
  const res=await fetch(API+"/api"+path,{method,headers:{"Content-Type":"application/json","X-Session-Token":_token},body:body?JSON.stringify(body):undefined});
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||"Request failed");
  return data;
}

function useC(dark){
  return {
    bg:dark?"#0a0e1a":"#f1f5f9",
    surface:dark?"#111827":"#ffffff",
    surface2:dark?"#1a2235":"#e2e8f0",
    surface3:dark?"#0f1929":"#f8fafc",
    border:dark?"#1e3a5f":"#cbd5e1",
    text:dark?"#f1f5f9":"#1e293b",
    muted:dark?"#94a3b8":"#64748b",
    dim:dark?"#475569":"#94a3b8",
  };
}

function mkS(C,dark){return {
  card:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 22px",marginBottom:14},
  input:{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 11px",color:C.text,fontSize:12,width:"100%",outline:"none"},
  label:{fontSize:10,color:C.muted,marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.08em"},
  btn:(v="primary",sz="md")=>({padding:sz==="sm"?"4px 9px":"7px 13px",borderRadius:5,border:"none",cursor:"pointer",fontSize:sz==="sm"?11:12,fontWeight:500,whiteSpace:"nowrap",
    background:v==="primary"?ACCENT:v==="danger"?DANGER:v==="success"?SUCCESS:v==="warning"?WARNING:v==="ghost"?C.surface2:"transparent",
    color:v==="ghost"?C.text:v==="link"?ACCENT:"#fff",
    border:v==="link"?"none":v==="ghost"?`1px solid ${C.border}`:"none"}),
  modal:{position:"fixed",inset:0,background:dark?"rgba(0,0,0,0.8)":"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000},
  modalBox:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:26,width:480,maxHeight:"90vh",overflowY:"auto"},
  th:{textAlign:"left",padding:"8px 12px",fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap",background:C.surface},
  td:{padding:"9px 12px",borderBottom:`1px solid ${dark?"rgba(30,58,95,0.35)":"rgba(203,213,225,0.5)"}`,fontSize:12,verticalAlign:"middle"},
  badge:(c)=>({display:"inline-block",padding:"2px 7px",borderRadius:3,fontSize:10,
    background:c==="success"?"rgba(16,185,129,0.15)":c==="danger"?"rgba(239,68,68,0.15)":c==="warning"?"rgba(245,158,11,0.15)":c==="purple"?"rgba(167,139,250,0.15)":c==="disabled"?"rgba(100,100,100,0.15)":"rgba(14,165,233,0.15)",
    color:c==="success"?SUCCESS:c==="danger"?DANGER:c==="warning"?WARNING:c==="purple"?PURPLE:c==="disabled"?C.muted:ACCENT}),
};}

const ThemeCtx=React.createContext({dark:true,C:{},S:{}});
function F({label,children,half}){
  const {C,S}=React.useContext(ThemeCtx);
  return <div style={{marginBottom:11,flex:half?"0 0 calc(50% - 6px)":undefined}}><label style={S.label}>{label}</label>{children}</div>;
}
function Btn({v="primary",sz="md",onClick,disabled,children,style={}}){
  const {S}=React.useContext(ThemeCtx);
  return <button style={{...S.btn(v,sz),...style,opacity:disabled?0.45:1}} onClick={onClick} disabled={disabled}>{children}</button>;
}

// QR Image component
function QRImg({value,size=180}){
  const [failed,setFailed]=useState(false);
  const {C}=React.useContext(ThemeCtx);
  const url=`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}&bgcolor=ffffff&color=000000&margin=10`;
  if(failed) return <div style={{background:"#fff",borderRadius:8,padding:16,textAlign:"center",width:size,display:"inline-block"}}><div style={{color:"#333",fontSize:11}}>QR unavailable — enter secret manually</div></div>;
  return <img src={url} width={size} height={size} style={{borderRadius:8,display:"block",margin:"0 auto"}} onError={()=>setFailed(true)} alt="Scan with Microsoft Authenticator"/>;
}

function Confirm({title,msg,onConfirm,onCancel,danger=true}){
  const {C,S}=React.useContext(ThemeCtx);
  return <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onCancel()}>
    <div style={{...S.modalBox,width:350}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:10,color:C.text}}>{title}</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:20}}>{msg}</div>
      <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={onCancel}>Cancel</Btn><button style={{...S.btn(danger?"danger":"primary"),flex:1}} onClick={onConfirm}>Confirm</button></div>
    </div>
  </div>;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginPage({onLogin,hasUsers,onRegister}){
  const {C,S,dark}=React.useContext(ThemeCtx);
  const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const [locked,setLocked]=useState(false);const [showReset,setShowReset]=useState(false);
  const [resetStep,setResetStep]=useState(1);const [resetCode,setResetCode]=useState("");const [newPass,setNewPass]=useState("");const [newPass2,setNewPass2]=useState("");const [resetErr,setResetErr]=useState("");const [resetLoading,setResetLoading]=useState(false);

  async function submit(){
    setLoading(true);setErr("");
    try{const d=await api("POST","/auth/login",{username:u,password:p});_token=d.token;_role=d.role;localStorage.setItem("pam_token",d.token);localStorage.setItem("pam_role",d.role);onLogin(d);}
    catch(e){if(e.message.includes("locked"))setLocked(true);setErr(e.message);}
    finally{setLoading(false);}
  }
  async function doReset(){
    if(newPass!==newPass2){setResetErr("Passwords don't match");return;}
    if(newPass.length<8){setResetErr("Password must be 8+ chars");return;}
    setResetLoading(true);setResetErr("");
    try{await api("POST","/auth/reset_password",{username:u,totp_code:resetCode,new_password:newPass});setShowReset(false);setLocked(false);setErr("Password reset. Please log in.");}
    catch(e){setResetErr(e.message);}finally{setResetLoading(false);}
  }

  if(showReset) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:420}}>
        <div style={{textAlign:"center",marginBottom:22}}><div style={{fontSize:20,fontWeight:700,color:ACCENT}}>⬡ PAM Vault</div><div style={{fontSize:12,color:C.muted,marginTop:3}}>Reset Password via MFA</div></div>
        <div style={S.card}>
          <F label="Username"><input style={S.input} value={u} onChange={e=>setU(e.target.value)}/></F>
          {resetStep===1&&<>
            <F label="Authenticator Code"><input style={{...S.input,fontSize:18,letterSpacing:"0.25em",textAlign:"center"}} value={resetCode} onChange={e=>setResetCode(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="000000" maxLength={6}/></F>
            <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={()=>setShowReset(false)}>Back</Btn><button style={{...S.btn("primary"),flex:1}} onClick={()=>resetCode.length===6&&setResetStep(2)} disabled={resetCode.length!==6}>Continue</button></div>
          </>}
          {resetStep===2&&<>
            <F label="New Password"><input style={S.input} type="password" value={newPass} onChange={e=>setNewPass(e.target.value)}/></F>
            <F label="Confirm"><input style={S.input} type="password" value={newPass2} onChange={e=>setNewPass2(e.target.value)}/></F>
            {resetErr&&<div style={{color:DANGER,fontSize:12,marginBottom:10}}>⚠ {resetErr}</div>}
            <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={()=>setResetStep(1)}>Back</Btn><button style={{...S.btn("success"),flex:1,opacity:resetLoading?0.7:1}} onClick={doReset} disabled={resetLoading}>{resetLoading?"Resetting...":"Reset Password"}</button></div>
          </>}
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:360}}>
        <div style={{textAlign:"center",marginBottom:26}}><div style={{fontSize:24,fontWeight:700,color:ACCENT}}>⬡ PAM Vault</div><div style={{fontSize:12,color:C.muted,marginTop:4}}>Privileged Access Management System</div></div>
        <div style={S.card}>
          {locked&&<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,padding:"10px 13px",fontSize:12,color:DANGER,marginBottom:13}}>
            🔒 Account locked after 3 failed attempts.<br/><span style={{color:ACCENT,cursor:"pointer"}} onClick={()=>{setShowReset(true);setResetStep(1);}}>Reset password with MFA →</span>
          </div>}
          <F label="Username"><input style={S.input} value={u} onChange={e=>setU(e.target.value)} placeholder="admin" onKeyDown={e=>e.key==="Enter"&&submit()}/></F>
          <F label="Password"><input style={S.input} type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()}/></F>
          {err&&!locked&&<div style={{color:DANGER,fontSize:12,marginBottom:10}}>⚠ {err}</div>}
          <Btn v="primary" onClick={submit} disabled={loading||locked} style={{width:"100%",padding:9}}>{loading?"Signing in...":"Sign In"}</Btn>
          {!hasUsers&&<div style={{marginTop:13,textAlign:"center"}}><span style={{fontSize:12,color:C.muted}}>No accounts. </span><span style={{fontSize:12,color:ACCENT,cursor:"pointer"}} onClick={onRegister}>Create admin →</span></div>}
        </div>
        <div style={{textAlign:"center",fontSize:11,color:C.dim,marginTop:10}}>TP072352 · APU Cybersecurity FYP</div>
      </div>
    </div>
  );
}

// ── REGISTER ──────────────────────────────────────────────────────────────────
function RegisterPage({onBack,onDone}){
  const {C,S}=React.useContext(ThemeCtx);
  const [step,setStep]=useState(1);const [u,setU]=useState("");const [p,setP]=useState("");const [c,setC_]=useState("");
  const [err,setErr]=useState("");const [qrData,setQrData]=useState(null);const [loading,setLoading]=useState(false);
  async function submit(){
    if(!u.trim()||p.length<8||p!==c){setErr(!u.trim()?"Username required":p.length<8?"Password 8+ chars":"Passwords don't match");return;}
    setLoading(true);setErr("");
    try{const d=await api("POST","/auth/register",{username:u,password:p});setQrData(d);setStep(2);}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:480}}>
        <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:20,fontWeight:700,color:ACCENT}}>⬡ PAM Vault</div><div style={{fontSize:12,color:C.muted,marginTop:3}}>Create Admin Account</div></div>
        <div style={S.card}>
          {step===1&&<>
            <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Step 1 of 2 — Account details</div>
            <F label="Username"><input style={S.input} value={u} onChange={e=>setU(e.target.value)} placeholder="admin"/></F>
            <F label="Password"><input style={S.input} type="password" value={p} onChange={e=>setP(e.target.value)}/></F>
            <F label="Confirm Password"><input style={S.input} type="password" value={c} onChange={e=>setC_(e.target.value)}/></F>
            {err&&<div style={{color:DANGER,fontSize:12,marginBottom:10}}>⚠ {err}</div>}
            <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={onBack}>Back</Btn><button style={{...S.btn("primary"),flex:1,opacity:loading?0.7:1}} onClick={submit} disabled={loading}>{loading?"Creating...":"Continue"}</button></div>
          </>}
          {step===2&&qrData&&<>
            <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Step 2 of 2 — Set up Microsoft Authenticator</div>
            <div style={{background:C.surface2,borderRadius:8,padding:20,textAlign:"center",marginBottom:13}}>
              <QRImg value={qrData.otp_uri} size={180}/>
              <div style={{marginTop:11,fontSize:12,color:C.muted}}>Open <strong style={{color:C.text}}>Microsoft Authenticator</strong> → Add account → Scan QR</div>
              <div style={{marginTop:9,background:C.surface,borderRadius:5,padding:"7px 11px",display:"inline-block"}}>
                <div style={{fontSize:10,color:C.dim,marginBottom:2,textTransform:"uppercase"}}>Manual secret:</div>
                <div style={{fontSize:12,color:ACCENT,letterSpacing:"0.12em",wordBreak:"break-all",fontWeight:600}}>{qrData.totp_secret}</div>
              </div>
            </div>
            <div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:6,padding:"9px 13px",fontSize:12,color:WARNING,marginBottom:14}}>⚠ Save this QR. It will NOT be shown again.</div>
            <Btn v="success" onClick={onDone} style={{width:"100%",padding:9}}>✓ I've scanned — Go to Login</Btn>
          </>}
        </div>
      </div>
    </div>
  );
}

// ── RETRIEVE MODAL ────────────────────────────────────────────────────────────
function RetrieveModal({account,onClose,onDone}){
  const {C,S}=React.useContext(ThemeCtx);
  const [code,setCode]=useState("");const [revealed,setRevealed]=useState(null);const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function verify(){
    if(code.length!==6)return;setLoading(true);setErr("");
    try{const d=await api("POST",`/accounts/${account.id}/retrieve`,{totp_code:code});setRevealed(d);if(onDone)onDone();}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  return <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{...S.modalBox,width:390}}>
      <div style={{textAlign:"center",marginBottom:14}}><div style={{fontSize:26,marginBottom:5}}>🔐</div><div style={{fontSize:14,fontWeight:600,color:C.text}}>Retrieve Credential</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{account.username}@{account.hostname}</div></div>
      {!revealed?<>
        <div style={{background:C.surface2,borderRadius:6,padding:"9px 13px",marginBottom:13,fontSize:12,color:C.muted}}>Enter 6-digit code from <strong style={{color:C.text}}>Microsoft Authenticator</strong>.</div>
        <F label="Authenticator Code"><input style={{...S.input,fontSize:20,letterSpacing:"0.3em",textAlign:"center"}} value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="000000" maxLength={6} onKeyDown={e=>e.key==="Enter"&&verify()} autoFocus/></F>
        {err&&<div style={{color:DANGER,fontSize:12,marginBottom:9}}>⚠ {err}</div>}
        <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={onClose}>Cancel</Btn><button style={{...S.btn("primary"),flex:1,opacity:(loading||code.length!==6)?0.5:1}} onClick={verify} disabled={loading||code.length!==6}>{loading?"Verifying...":"Verify & Reveal"}</button></div>
      </>:<>
        <div style={{background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.25)",borderRadius:7,padding:"13px 17px",marginBottom:13}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:2,textTransform:"uppercase"}}>Username</div>
          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:11}}>{revealed.username}</div>
          <div style={{fontSize:10,color:C.muted,marginBottom:2,textTransform:"uppercase"}}>Current Password</div>
          <div style={{fontSize:16,fontWeight:700,color:SUCCESS,letterSpacing:"0.05em",wordBreak:"break-all"}}>{revealed.password}</div>
        </div>
        <div style={{fontSize:11,color:C.dim,marginBottom:13,textAlign:"center"}}>⚠ Retrieval logged in audit trail.</div>
        <Btn v="ghost" onClick={onClose} style={{width:"100%"}}>Close</Btn>
      </>}
    </div>
  </div>;
}

// ── PSM CONNECT MODAL ─────────────────────────────────────────────────────────
function PSMModal({account,onClose}){
  const {C,S}=React.useContext(ThemeCtx);
  const [step,setStep]=useState("mfa"); // mfa | connecting | session
  const [code,setCode]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const [sessData,setSessData]=useState(null);
  const termRef=useRef(null);const termInstance=useRef(null);

  async function connect(){
    if(code.length!==6)return;
    setLoading(true);setErr("");
    try{
      const d=await api("POST",`/accounts/${account.id}/psm/connect`,{totp_code:code});
      setSessData(d);setStep("session");
    }catch(e){setErr(e.message);}finally{setLoading(false);}
  }

  useEffect(()=>{
    if(step==="session"&&sessData&&account.os==="windows"){
      // For Windows: auto-download RDP file
      const blob=new Blob([sessData.rdp_content],{type:"text/plain"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=`${account.name.replace(/\s+/g,"_")}.rdp`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    }
    if(step==="session"&&sessData&&account.os==="linux"&&termRef.current&&!termInstance.current){
      // Initialize xterm terminal
      try{
        const term=new Terminal({cursorBlink:true,fontSize:12,fontFamily:"monospace",theme:{background:"#0a0e1a",foreground:"#f1f5f9"},rows:20,cols:80});
        const fitAddon=new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(termRef.current);
        fitAddon.fit();
        termInstance.current=term;
        // Show connection info and instructions
        term.writeln(`\r\n\x1b[32m  PAM Vault — PSM SSH Session\x1b[0m`);
        term.writeln(`\x1b[36m  Target:\x1b[0m ${sessData.username}@${sessData.hostname}:${sessData.port}`);
        term.writeln(`\x1b[36m  Password:\x1b[0m ${sessData.password}`);
        term.writeln(`\r\n\x1b[33m  Note: Browser-based SSH requires a WebSSH proxy service.\x1b[0m`);
        term.writeln(`\x1b[33m  Run this command on the controller to start one:\x1b[0m`);
        term.writeln(`\r\n\x1b[97m  pip install webssh && wssh --port 8888\x1b[0m`);
        term.writeln(`\r\n  Then open: \x1b[4mhttp://localhost:8888\x1b[0m`);
        term.writeln(`  Host: ${sessData.hostname}  Port: ${sessData.port}  Username: ${sessData.username}`);
        term.writeln(`\r\n\x1b[32m  Copy the password above — it is auto-filled above for you.\x1b[0m`);
        term.writeln(`\r\n\x1b[90m  ─────────────────────────────────────────────────\x1b[0m`);
        term.writeln(`  SSH command:`);
        term.writeln(`\x1b[97m  ${sessData.ssh_command}\x1b[0m\r\n`);
      }catch(e){console.warn("xterm not available",e);}
    }
  },[step,sessData]);

  return <div style={{...S.modal,zIndex:1100}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{...S.modalBox,width:account.os==="linux"&&step==="session"?700:440,maxWidth:"95vw"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:C.text}}>PSM Connect — {account.name}</div>
          <div style={{fontSize:11,color:C.muted}}>{account.os==="windows"?"Remote Desktop (RDP)":"SSH Terminal"} · {account.username}@{account.hostname}</div>
        </div>
        <Btn v="ghost" sz="sm" onClick={onClose}>✕</Btn>
      </div>

      {step==="mfa"&&<>
        <div style={{background:C.surface2,borderRadius:6,padding:"9px 13px",marginBottom:13,fontSize:12,color:C.muted}}>MFA verification required before opening a privileged session.</div>
        <F label="Authenticator Code"><input style={{...S.input,fontSize:20,letterSpacing:"0.3em",textAlign:"center"}} value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="000000" maxLength={6} onKeyDown={e=>e.key==="Enter"&&connect()} autoFocus/></F>
        {err&&<div style={{color:DANGER,fontSize:12,marginBottom:9}}>⚠ {err}</div>}

          <Btn v="ghost" onClick={onClose} style={{flex:1}}>Close</Btn>
        </div>
      </>}

      {step==="session"&&sessData&&account.os==="linux"&&<>
        <div style={{background:"#0a0e1a",borderRadius:7,padding:4,marginBottom:13,border:"1px solid #1e3a5f"}}>

        </div>
        <Btn v="ghost" onClick={onClose} style={{width:"100%"}}>Close</Btn>
      </>}
    </div>
  </div>;
}

// ── CHANGE PASS MODAL ─────────────────────────────────────────────────────────

          <Btn v="primary" sz="sm" onClick={()=>setShowRetrieve(true)} style={{width:"100%",textAlign:"center"}}>🔑 Retrieve Credential</Btn>
          {!isReadOnly&&<>
            <Btn v="ghost" sz="sm" onClick={doVerify} disabled={verifying} style={{width:"100%",textAlign:"center"}}>{verifying?"⟳ Verifying...":"✓ Verify Password"}</Btn>
            <Btn v="warning" sz="sm" onClick={()=>setShowChangePass(true)} style={{width:"100%",textAlign:"center"}}>🔄 Change Password</Btn>
            <Btn v="ghost" sz="sm" onClick={()=>setShowPSM(true)} style={{width:"100%",textAlign:"center"}}>🖥 PSM Connect</Btn>
            <Btn v="ghost" sz="sm" onClick={()=>setShowEdit(true)} style={{width:"100%",textAlign:"center"}}>✏️ Edit Account</Btn>
          </>}
          {isReadOnly&&<Btn v="ghost" sz="sm" onClick={()=>setShowPSM(true)} style={{width:"100%",textAlign:"center"}}>🖥 PSM Connect</Btn>}
        </div>

        <div style={{padding:"12px 16px",flex:1}}>

            <div key={k} style={{marginBottom:9,paddingBottom:9,borderBottom:`1px solid ${C.border}44`}}>

        </div>

        {tab==="activities"&&<div style={{flex:1,overflowY:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>

  async function addAccount(form){await api("POST","/accounts",form);setShowAdd(false);load();}
  async function deleteAccount(acc){await api("DELETE",`/accounts/${acc.id}`);setSelected(p=>p.filter(id=>id!==acc.id));setCart(p=>p.filter(id=>id!==acc.id));setDeleteAcc(null);load();}

  async function doBulkVerify(){
    if(selected.length===0)return;setBulkLoading(true);setBulkResults(null);setActionMsg(null);
    try{const d=await api("POST","/accounts/bulk/verify",{account_ids:selected});setBulkResults(d);setActionMsg({type:"info",text:`Verified ${selected.length} account(s).`});}
    catch(e){setActionMsg({type:"error",text:e.message});}finally{setBulkLoading(false);load();}
  }
  async function doBulkChange(){
    if(selected.length===0)return;setBulkLoading(true);setBulkResults(null);setActionMsg(null);
    try{const d=await api("POST","/accounts/bulk/rotate",{account_ids:selected});setBulkResults(d);setActionMsg({type:"info",text:`Changed passwords for ${selected.length} account(s).`});}
    catch(e){setActionMsg({type:"error",text:e.message});}finally{setBulkLoading(false);load();}
  }
  function addSelectedToCart(){setCart(p=>[...new Set([...p,...selected])]);setActionMsg({type:"success",text:`Added ${selected.length} account(s) to cart.`});}

  const filtered=accounts.filter(a=>a.name.toLowerCase().includes(search.toLowerCase())||a.hostname.includes(search)||a.username.toLowerCase().includes(search.toLowerCase()));
  const toggleSel=id=>setSelected(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const allSel=filtered.length>0&&filtered.every(a=>selected.includes(a.id));
  const toggleAll=()=>allSel?setSelected(p=>p.filter(id=>!filtered.find(a=>a.id===id))):setSelected(p=>[...new Set([...p,...filtered.map(a=>a.id)])]);

  const statusBadge=a=>{if(!a.auto_management)return"disabled";if(a.status==="never_verified")return"info";return a.status==="active"?"success":a.status==="error"?"danger":"warning";};
  const statusLabel=a=>{if(!a.auto_management)return"Mgmt Disabled";if(a.status==="never_verified")return"Never Verified";return a.status;};
  const osIcon=os=>os==="windows"?"🪟":"🐧";

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div><div style={{fontSize:18,fontWeight:700,color:C.text}}>Account Vault</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{accounts.length} accounts</div></div>
        <div style={{display:"flex",gap:7}}>
          <input style={{...S.input,width:180}} placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
          {!isReadOnly&&<Btn v="primary" onClick={()=>setShowAdd(true)}>+ Add Account</Btn>}
        </div>
      </div>

      {isReadOnly&&<div style={{background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:7,padding:"7px 13px",marginBottom:12,fontSize:12,color:WARNING}}>👁 Read-only — view and retrieve credentials only. Cannot add, edit, delete or rotate.</div>}

      {/* Selection action bar */}
      {selected.length>0&&<div style={{background:`${ACCENT}10`,border:`1px solid ${ACCENT}33`,borderRadius:7,padding:"9px 13px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:ACCENT,fontWeight:500}}>{selected.length} selected</span>
          <div style={{display:"flex",gap:6,marginLeft:6,flexWrap:"wrap"}}>
            <Btn v="ghost" sz="sm" onClick={addSelectedToCart} style={{background:C.surface2,color:C.text}}>🛒 Add to Cart</Btn>
            {!isReadOnly&&<Btn v="ghost" sz="sm" onClick={doBulkVerify} disabled={bulkLoading} style={{background:C.surface2,color:C.text}}>✓ Verify All</Btn>}
            {!isReadOnly&&<Btn v="warning" sz="sm" onClick={doBulkChange} disabled={bulkLoading}>🔄 Change Passwords</Btn>}
            <Btn v="ghost" sz="sm" onClick={load}>↻ Refresh</Btn>
            <Btn v="ghost" sz="sm" onClick={()=>setSelected([])} style={{color:C.dim}}>✕ Deselect</Btn>
          </div>
          {bulkLoading&&<span style={{fontSize:11,color:C.muted}}>⟳ Processing...</span>}
        </div>
        {bulkResults&&<div style={{marginTop:9,display:"flex",flexWrap:"wrap",gap:5}}>
          {bulkResults.map((r,i)=><span key={i} style={{...S.badge(r.success?"success":"danger"),fontSize:11}}>{r.name}: {r.success?"✓ OK":"✗ "+(r.error||"Failed")}</span>)}
        </div>}
        {actionMsg&&<div style={{marginTop:7,fontSize:12,color:actionMsg.type==="success"?SUCCESS:actionMsg.type==="error"?DANGER:ACCENT}}>{actionMsg.text}</div>}
      </div>}

      <div style={{...S.card,padding:0,overflow:"hidden"}}>
        {loading?<div style={{padding:32,textAlign:"center",color:C.dim}}>Loading...</div>:
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={{...S.th,width:36}}><input type="checkbox" checked={allSel} onChange={toggleAll}/></th>
            <th style={S.th}>Account Name</th><th style={S.th}>Address</th><th style={S.th}>Username</th>
            <th style={S.th}>OS</th><th style={S.th}>Status</th><th style={S.th}>Last Verified</th><th style={S.th}>Last Changed</th>
            {!isReadOnly&&<th style={S.th}>Del</th>}
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={9} style={{...S.td,textAlign:"center",color:C.dim,padding:32}}>{accounts.length===0?"No accounts. Click '+ Add Account' to start.":"No results."}</td></tr>}
            {filtered.map(acc=>(
              <tr key={acc.id} style={{background:selected.includes(acc.id)?`${ACCENT}08`:"transparent",cursor:"pointer"}} onClick={e=>{if(e.target.type==="checkbox"||e.target.closest("button"))return;onOpenAccount(acc);}}>
                <td style={{...S.td,width:36}} onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selected.includes(acc.id)} onChange={()=>toggleSel(acc.id)}/></td>
                <td style={S.td}><div style={{fontWeight:500,color:ACCENT}}>{acc.name}</div></td>
                <td style={{...S.td,color:C.muted}}>{acc.hostname}:{acc.port}</td>
                <td style={{...S.td,color:C.muted}}>{acc.username}</td>
                <td style={S.td}>{osIcon(acc.os)} {acc.os}</td>
                <td style={S.td}><span style={S.badge(statusBadge(acc))}>{statusLabel(acc)}</span></td>
                <td style={{...S.td,fontSize:11,color:C.dim}}>{acc.last_verified?new Date(acc.last_verified).toLocaleString():"Never"}</td>
                <td style={{...S.td,fontSize:11,color:C.dim}}>{acc.last_rotated?new Date(acc.last_rotated).toLocaleString():"Never"}</td>
                {!isReadOnly&&<td style={S.td} onClick={e=>e.stopPropagation()}><Btn v="ghost" sz="sm" onClick={()=>setDeleteAcc(acc)} style={{color:DANGER}}>🗑</Btn></td>}
              </tr>
            ))}
          </tbody>
        </table>}
      </div>

      {showAdd&&<AccountEditModal account={null} onSave={addAccount} onClose={()=>setShowAdd(false)}/>}
      {deleteAcc&&<Confirm title="Delete Account" msg={`Delete "${deleteAcc.name}"? The stored credential will be permanently removed.`} onConfirm={()=>deleteAccount(deleteAcc)} onCancel={()=>setDeleteAcc(null)}/>}
    </div>
  );
}

// ── CART PAGE ──────────────────────────────────────────────────────────────────

  useEffect(()=>{load();},[cart.length]);

  async function doBulkVerify(){setBulkLoading(true);setBulkResults(null);setActionMsg(null);try{const d=await api("POST","/accounts/bulk/verify",{account_ids:cart});setBulkResults(d);setActionMsg({type:"info",text:"Verification complete."});}catch(e){setActionMsg({type:"error",text:e.message});}finally{setBulkLoading(false);load();}}

      </div>
      {bulkResults&&<div style={{...S.card,marginBottom:13}}><div style={{fontSize:12,fontWeight:600,marginBottom:9,color:C.text}}>Results</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{bulkResults.map((r,i)=><span key={i} style={{...S.badge(r.success?"success":"danger"),fontSize:11}}>{r.name}: {r.success?"✓ OK":"✗ "+(r.error||"Failed")}</span>)}</div></div>}

// ── REPORT PAGE ────────────────────────────────────────────────────────────────
function ReportPage(){
  const {C,S}=React.useContext(ThemeCtx);
  const [generating,setGenerating]=useState({});
  const [msg,setMsg]=useState(null);

  const reports=[
    {key:"all",label:"Full Inventory",desc:"All accounts in the vault — name, address, OS, status, last verified, last changed.",icon:"📋"},
    {key:"linux",label:"Linux Accounts Only",desc:"Filtered to Linux/SSH accounts only.",icon:"🐧"},
    {key:"windows",label:"Windows Accounts Only",desc:"Filtered to Windows/WinRM accounts only.",icon:"🪟"},
    {key:"disabled",label:"CPM Disabled Accounts",desc:"Accounts where automatic management has been disabled by admin.",icon:"⛔"},
    {key:"verified_only",label:"Verified but Not Changed",desc:"Accounts that have been verified at least once but whose password has never been rotated.",icon:"✓"},
  ];

  async function generate(key){
    setGenerating(g=>({...g,[key]:true}));setMsg(null);
    try{
      const res=await fetch(`/api/reports/csv?filter=${key}`,{headers:{"X-Session-Token":_token}});
      if(!res.ok){const d=await res.json();throw new Error(d.error);}
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const cd=res.headers.get("Content-Disposition")||"";
      const fn=cd.match(/filename=(.+)/)?.[1]||`report_${key}.csv`;
      const a=document.createElement("a");a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);
      setMsg({type:"success",text:`✓ ${fn} downloaded.`});
    }catch(e){setMsg({type:"error",text:"Error: "+e.message});}
    finally{setGenerating(g=>({...g,[key]:false}));}
  }

  return(
    <div>
      <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4}}>Reports</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Generate CSV exports of your vault inventory.</div>
      {msg&&<div style={{background:msg.type==="success"?"rgba(16,185,129,0.08)":"rgba(239,68,68,0.08)",border:`1px solid ${msg.type==="success"?"rgba(16,185,129,0.25)":"rgba(239,68,68,0.25)"}`,borderRadius:7,padding:"9px 13px",fontSize:12,color:msg.type==="success"?SUCCESS:DANGER,marginBottom:14}}>{msg.text}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {reports.map(r=>(
          <div key={r.key} style={{...S.card,display:"flex",alignItems:"center",gap:16,marginBottom:0}}>
            <div style={{fontSize:24,flexShrink:0}}>{r.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13,color:C.text,marginBottom:3}}>{r.label}</div>
              <div style={{fontSize:12,color:C.muted}}>{r.desc}</div>
            </div>
            <Btn v="primary" sz="sm" onClick={()=>generate(r.key)} disabled={generating[r.key]} style={{flexShrink:0}}>{generating[r.key]?"Generating...":"↓ Export CSV"}</Btn>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── USERS PAGE ─────────────────────────────────────────────────────────────────
function UsersPage({currentUser,currentRole}){
  const {C,S}=React.useContext(ThemeCtx);
  const [users,setUsers]=useState([]);const [showAdd,setShowAdd]=useState(false);const [step,setStep]=useState(1);
  const [form,setForm]=useState({username:"",password:"",role:"readonly"});const [qrData,setQrData]=useState(null);
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);const [deleteUser,setDeleteUser]=useState(null);
  const [showCP,setShowCP]=useState(false);const [cpForm,setCpForm]=useState({old_password:"",new_password:"",confirm:"",totp_code:""});const [cpErr,setCpErr]=useState("");const [cpLoading,setCpLoading]=useState(false);

  async function load(){try{const d=await api("GET","/auth/users");setUsers(d);}catch(e){}}
  useEffect(()=>{load();},[]);
  async function create(){
    if(!form.username||form.password.length<8){setErr("Username required, password 8+ chars.");return;}
    setLoading(true);setErr("");
    try{const d=await api("POST","/auth/create_user",{username:form.username,password:form.password,role:form.role});setQrData(d);setStep(2);}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  async function handleDelete(u){try{await api("DELETE",`/auth/users/${u.username}`);setDeleteUser(null);load();}catch(e){alert(e.message);}}
  async function doCP(){
    if(cpForm.new_password!==cpForm.confirm){setCpErr("Passwords don't match");return;}
    if(cpForm.new_password.length<8){setCpErr("8+ chars required");return;}
    if(cpForm.totp_code.length!==6){setCpErr("Enter 6-digit MFA code");return;}
    setCpLoading(true);setCpErr("");
    try{await api("POST","/auth/change_password",{old_password:cpForm.old_password,new_password:cpForm.new_password,totp_code:cpForm.totp_code});setShowCP(false);setCpForm({old_password:"",new_password:"",confirm:"",totp_code:""});load();}
    catch(e){setCpErr(e.message);}finally{setCpLoading(false);}
  }
  function done(){setShowAdd(false);setStep(1);setForm({username:"",password:"",role:"readonly"});setQrData(null);load();}
  const now=new Date();

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div><div style={{fontSize:18,fontWeight:700,color:C.text}}>Vault Users</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{users.length} account{users.length!==1?"s":""}</div></div>
        <div style={{display:"flex",gap:7}}>
          <Btn v="ghost" onClick={()=>setShowCP(true)}>🔑 Change My Password</Btn>
          {currentRole==="admin"&&<Btn v="primary" onClick={()=>{setShowAdd(true);setStep(1);setQrData(null);setErr("");}}>+ Create User</Btn>}
        </div>
      </div>
      <div style={{background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:7,padding:"8px 13px",marginBottom:14,fontSize:12,color:WARNING}}>
        🔒 <strong>Password Policy:</strong> Vault user passwords must be changed every 30 days. Expired accounts are flagged below.
      </div>
      <div style={{...S.card,padding:0,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            <th style={S.th}>User</th><th style={S.th}>Role</th><th style={S.th}>MFA</th>
            <th style={S.th}>Password Age</th><th style={S.th}>Policy Status</th>
            {currentRole==="admin"&&<th style={S.th}>Actions</th>}
          </tr></thead>
          <tbody>
            {users.map((u,i)=>{
              const changed=u.password_changed_at||u.created_at;
              const days=changed?Math.floor((now-new Date(changed))/86400000):0;
              const expired=days>=30;
              return <tr key={i}>
                <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:30,height:30,borderRadius:"50%",background:"rgba(14,165,233,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:ACCENT,flexShrink:0}}>{u.username[0].toUpperCase()}</div><div><div style={{fontWeight:500,color:C.text}}>{u.username}</div>{u.username===currentUser&&<span style={{...S.badge("success"),fontSize:10}}>you</span>}</div></div></td>
                <td style={S.td}><span style={S.badge(u.role==="admin"?"success":"purple")}>{u.role==="admin"?"Admin":"Read Only"}</span></td>
                <td style={S.td}><span style={{fontSize:11,color:SUCCESS}}>✓ Enabled</span></td>
                <td style={S.td}><span style={{fontSize:12,color:expired?DANGER:days>20?WARNING:SUCCESS}}>{days} days</span></td>
                <td style={S.td}>{expired?<span style={S.badge("danger")}>Expired</span>:<span style={S.badge("success")}>Active</span>}</td>
                {currentRole==="admin"&&<td style={S.td}>{u.username!==currentUser?<Btn v="ghost" sz="sm" onClick={()=>setDeleteUser(u)} style={{color:DANGER}}>🗑 Delete</Btn>:<span style={{fontSize:11,color:C.dim}}>—</span>}</td>}
              </tr>;
            })}
          </tbody>
        </table>
      </div>
      {showCP&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowCP(false)}>
        <div style={{...S.modalBox,width:400}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:14,color:C.text}}>Change My Vault Password</div>
          <F label="Current Password"><input style={S.input} type="password" value={cpForm.old_password} onChange={e=>setCpForm(f=>({...f,old_password:e.target.value}))}/></F>
          <F label="New Password"><input style={S.input} type="password" value={cpForm.new_password} onChange={e=>setCpForm(f=>({...f,new_password:e.target.value}))}/></F>
          <F label="Confirm"><input style={S.input} type="password" value={cpForm.confirm} onChange={e=>setCpForm(f=>({...f,confirm:e.target.value}))}/></F>
          <F label="Authenticator Code (MFA required)"><input style={{...S.input,fontSize:17,letterSpacing:"0.22em",textAlign:"center"}} value={cpForm.totp_code} onChange={e=>setCpForm(f=>({...f,totp_code:e.target.value.replace(/\D/g,"").slice(0,6)}))} placeholder="000000" maxLength={6}/></F>
          {cpErr&&<div style={{color:DANGER,fontSize:12,marginBottom:9}}>⚠ {cpErr}</div>}
          <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={()=>setShowCP(false)}>Cancel</Btn><button style={{...S.btn("primary"),flex:1,opacity:cpLoading?0.7:1}} onClick={doCP} disabled={cpLoading}>{cpLoading?"Changing...":"Change Password"}</button></div>
        </div>
      </div>}
      {showAdd&&<div style={S.modal} onClick={e=>e.target===e.currentTarget&&done()}>
        <div style={{...S.modalBox,width:430}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:14,color:C.text}}>Create Vault User</div>
          {step===1?<>
            <F label="Username"><input style={S.input} value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))}/></F>
            <F label="Password"><input style={S.input} type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></F>
            <F label="Role"><select style={S.input} value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
              <option value="admin">Admin — full access</option>
              <option value="readonly">Read Only — view and retrieve only</option>
            </select></F>
            <div style={{background:C.surface2,borderRadius:5,padding:"8px 12px",fontSize:12,color:C.muted,marginBottom:11}}>{form.role==="admin"?"Admin can manage all accounts and users.":"Read-only users can view accounts and retrieve credentials (MFA) but cannot make changes."}</div>
            {err&&<div style={{color:DANGER,fontSize:12,marginBottom:9}}>⚠ {err}</div>}
            <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={done}>Cancel</Btn><button style={{...S.btn("primary"),flex:1,opacity:loading?0.7:1}} onClick={create} disabled={loading}>{loading?"Creating...":"Continue"}</button></div>
          </>:qrData&&<>
            <div style={{background:C.surface2,borderRadius:7,padding:18,textAlign:"center",marginBottom:13}}>
              <QRImg value={qrData.otp_uri} size={180}/>
              <div style={{marginTop:10,fontSize:11,color:C.muted}}>Open Authenticator → Add account → Scan QR</div>
              <div style={{marginTop:8,background:C.surface,borderRadius:5,padding:"6px 10px",display:"inline-block"}}>
                <div style={{fontSize:10,color:C.dim,marginBottom:2,textTransform:"uppercase"}}>Manual secret:</div>
                <div style={{fontSize:12,color:ACCENT,letterSpacing:"0.1em",wordBreak:"break-all",fontWeight:600}}>{qrData.totp_secret}</div>
              </div>
            </div>
            <div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:5,padding:"8px 12px",fontSize:12,color:WARNING,marginBottom:13}}>⚠ Will NOT be shown again.</div>
            <Btn v="success" onClick={done} style={{width:"100%"}}>✓ Confirm & Create User</Btn>
          </>}
        </div>
      </div>}
      {deleteUser&&<Confirm title="Delete User" msg={`Delete "${deleteUser.username}"? They lose all vault access immediately.`} onConfirm={()=>handleDelete(deleteUser)} onCancel={()=>setDeleteUser(null)}/>}
    </div>
  );
}

// ── PASSWORD EXPIRED MODAL ─────────────────────────────────────────────────────
function PasswordExpiredModal({onClose,onChanged}){
  const {C,S}=React.useContext(ThemeCtx);
  const [form,setForm]=useState({old_password:"",new_password:"",confirm:"",totp_code:""});const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function submit(){
    if(form.new_password!==form.confirm){setErr("Passwords don't match");return;}
    if(form.new_password.length<8){setErr("8+ chars required");return;}
    if(form.totp_code.length!==6){setErr("Enter 6-digit MFA code");return;}
    setLoading(true);setErr("");
    try{await api("POST","/auth/change_password",{old_password:form.old_password,new_password:form.new_password,totp_code:form.totp_code});onChanged();}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  }
  return <div style={{...S.modal,zIndex:2000}}>
    <div style={{...S.modalBox,width:400}}>
      <div style={{textAlign:"center",marginBottom:14}}><div style={{fontSize:26,marginBottom:5}}>⚠️</div><div style={{fontSize:14,fontWeight:600,color:WARNING}}>Password Expired</div><div style={{fontSize:12,color:C.muted,marginTop:3}}>Your vault password is over 30 days old. Please set a new one.</div></div>
      <F label="Current Password"><input style={S.input} type="password" value={form.old_password} onChange={e=>setForm(f=>({...f,old_password:e.target.value}))}/></F>
      <F label="New Password"><input style={S.input} type="password" value={form.new_password} onChange={e=>setForm(f=>({...f,new_password:e.target.value}))}/></F>
      <F label="Confirm"><input style={S.input} type="password" value={form.confirm} onChange={e=>setForm(f=>({...f,confirm:e.target.value}))}/></F>
      <F label="Authenticator Code"><input style={{...S.input,fontSize:17,letterSpacing:"0.22em",textAlign:"center"}} value={form.totp_code} onChange={e=>setForm(f=>({...f,totp_code:e.target.value.replace(/\D/g,"").slice(0,6)}))} placeholder="000000" maxLength={6}/></F>
      {err&&<div style={{color:DANGER,fontSize:12,marginBottom:9}}>⚠ {err}</div>}
      <div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={onClose}>Skip</Btn><button style={{...S.btn("warning"),flex:1,opacity:loading?0.7:1}} onClick={submit} disabled={loading}>{loading?"Changing...":"Change Password"}</button></div>
    </div>
  </div>;
}

// ── APP SHELL ──────────────────────────────────────────────────────────────────
function App(){
  const {dark,toggle}=useTheme();
  const C=useC(dark);
  const S=mkS(C,dark);
  const ctx=useMemo(()=>({dark,C,S}),[dark,C,S]);

  const [page,setPage]=useState("accounts");
  const [openAccount,setOpenAccount]=useState(null);
  const [session,setSession]=useState(null);
  const [hasUsers,setHasUsers]=useState(true);
  const [showRegister,setShowRegister]=useState(false);
  const [cart,setCart]=useState([]);
  const [selected,setSelected]=useState([]);
  const [checking,setChecking]=useState(true);
  const [showExpired,setShowExpired]=useState(false);

  useEffect(()=>{
    async function init(){
      try{
        const s=await api("GET","/auth/status");
        setHasUsers(s.has_users);
        if(!s.has_users){setShowRegister(true);setChecking(false);return;}
        const t=localStorage.getItem("pam_token");
        if(t){_token=t;_role=localStorage.getItem("pam_role")||"";
          try{await api("GET","/accounts");const u=localStorage.getItem("pam_user");if(u)setSession({username:u,role:_role});}
          catch(e){localStorage.removeItem("pam_token");localStorage.removeItem("pam_user");localStorage.removeItem("pam_role");}
        }
      }catch(e){}setChecking(false);
    }
    init();
  },[]);

  function handleLogin(d){_token=d.token;_role=d.role;localStorage.setItem("pam_token",d.token);localStorage.setItem("pam_user",d.username);localStorage.setItem("pam_role",d.role);setSession(d);if(d.password_expired)setShowExpired(true);}
  async function handleLogout(){try{await api("POST","/auth/logout");}catch(e){}_token="";_role="";localStorage.removeItem("pam_token");localStorage.removeItem("pam_user");localStorage.removeItem("pam_role");setSession(null);setCart([]);setSelected([]);setOpenAccount(null);}
  function handleRegistered(){api("GET","/auth/status").then(d=>setHasUsers(d.has_users));setShowRegister(false);}

  if(checking) return <ThemeCtx.Provider value={{dark,C,S}}><div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}>Loading...</div></ThemeCtx.Provider>;
  if(showRegister&&!session) return <ThemeCtx.Provider value={{dark,C,S}}><RegisterPage onBack={()=>setShowRegister(false)} onDone={handleRegistered}/></ThemeCtx.Provider>;
  if(!session) return <ThemeCtx.Provider value={{dark,C,S}}><LoginPage onLogin={handleLogin} hasUsers={hasUsers} onRegister={()=>setShowRegister(true)}/></ThemeCtx.Provider>;

  const isReadOnly=session.role==="readonly";
  const navItems=[
    {key:"accounts",label:"Account Vault",icon:"🔒"},
    {key:"cart",label:"Cart"+(cart.length>0?` (${cart.length})`:""),icon:"🛒"},
    {key:"report",label:"Reports",icon:"📊"},
    ...(!isReadOnly?[{key:"users",label:"Vault Users",icon:"👤"}]:[]),
  ];

  return(
    <ThemeCtx.Provider value={ctx}>
      <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
        {/* Sidebar */}
        <div style={{width:206,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:100}}>
          <div style={{padding:"16px 15px 11px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:15,fontWeight:700,color:ACCENT}}>⬡ PAM Vault</div>
            <div style={{fontSize:10,color:C.dim,marginTop:2}}>Privileged Access Mgmt</div>
          </div>
          <div style={{flex:1,paddingTop:5}}>
            {navItems.map(item=>(
              <div key={item.key} onClick={()=>{setPage(item.key);setOpenAccount(null);}} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 15px",cursor:"pointer",color:page===item.key&&!openAccount?ACCENT:C.muted,background:page===item.key&&!openAccount?`${ACCENT}12`:"transparent",borderLeft:`2px solid ${page===item.key&&!openAccount?ACCENT:"transparent"}`,userSelect:"none",fontSize:12,transition:"all 0.1s"}}>
                <span>{item.icon}</span><span>{item.label}</span>
              </div>
            ))}
          </div>
          <div style={{padding:"11px 15px",borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.text,marginBottom:3,fontWeight:500}}>{session.username}</div>
            <div style={{marginBottom:4}}><span style={S.badge(isReadOnly?"purple":"success")}>{isReadOnly?"Read Only":"Admin"}</span></div>
            <div style={{fontSize:10,color:C.dim,marginBottom:7}}>🔐 MFA Active</div>
            <Btn v="ghost" onClick={handleLogout} style={{width:"100%",fontSize:11,padding:"4px"}}>Sign Out</Btn>
          </div>
        </div>

        {/* Main */}
        <div style={{marginLeft:206,flex:1,display:"flex",flexDirection:"column"}}>
          {/* Top bar */}
          <div style={{height:46,background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",padding:"0 22px",gap:6,position:"sticky",top:0,zIndex:50}}>
            <span style={{fontSize:12,color:C.dim,cursor:"pointer"}} onClick={()=>{setPage("accounts");setOpenAccount(null);}}>Account Vault</span>
            {openAccount&&<><span style={{color:C.dim,fontSize:12}}>›</span><span style={{fontSize:12,color:C.text}}>{openAccount.name}</span></>}
            <div style={{flex:1}}/>
            {/* Theme toggle */}
            <button onClick={toggle} style={{...S.btn("ghost","sm"),fontSize:11,marginRight:6}} title="Toggle dark/light mode">
              {dark?"☀️ Light":"🌙 Dark"}
            </button>
            <span style={{fontSize:11,color:C.dim}}>TP072352 · APU FYP</span>
          </div>

          <div style={{flex:1,padding:"18px 26px",overflowY:"auto"}}>
            {page==="accounts"&&!openAccount&&<AccountsPage cart={cart} setCart={setCart} selected={selected} setSelected={setSelected} isReadOnly={isReadOnly} onOpenAccount={acc=>{setOpenAccount(acc);}}/>}
            {page==="accounts"&&openAccount&&<AccountDetailPage account={openAccount} onBack={()=>setOpenAccount(null)} isReadOnly={isReadOnly} currentUser={session.username}/>}
            {page==="cart"&&<CartPage cart={cart} setCart={setCart} isReadOnly={isReadOnly} onOpenAccount={acc=>{setOpenAccount(acc);setPage("accounts");}}/>}
            {page==="report"&&<ReportPage/>}
            {page==="users"&&!isReadOnly&&<UsersPage currentUser={session.username} currentRole={session.role}/>}
          </div>
        </div>

        {showExpired&&<PasswordExpiredModal onClose={()=>setShowExpired(false)} onChanged={()=>setShowExpired(false)}/>}
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
